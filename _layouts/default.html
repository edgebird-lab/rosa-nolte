<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ page.title | default: site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}" />

  <link rel="icon" type="image/svg+xml" href="{{ '/assets/img/favicon.svg' | relative_url }}" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Outfit:wght@300;400;500&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}" />
  {% seo %}
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
</head>
<body>
  <div class="layout">

    <!-- ── Sidebar ── -->
    <aside class="sidebar" id="sidebar">
      {% include sidebar.html %}
    </aside>

    <!-- ── Overlay für Mobile ── -->
    <div class="sidebar-overlay" id="sidebar-overlay"></div>

    <!-- ── Hauptinhalt ── -->
    <main class="main-content" id="main-content">
      {{ content }}
    </main>

  </div>

  <script src="{{ '/assets/js/main.js' | relative_url }}"></script>
  <script>
    if (window.netlifyIdentity) {
      window.netlifyIdentity.on("init", user => {
        if (!user) {
          window.netlifyIdentity.on("login", () => {
            document.location.href = "/admin/";
          });
        }
      });
    }
  </script>
</body>
</html>
