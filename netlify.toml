# ═══════════════════════════════════════════════
# Netlify Build-Konfiguration
# Rosa Nolte Fotografie – Rosa Nolte
# ═══════════════════════════════════════════════

[build]
  command   = "bundle exec jekyll build"
  publish   = "_site"

[build.environment]
  RUBY_VERSION = "3.2.2"
  JEKYLL_ENV   = "production"

# ── CMS Admin ────────────────────────────────
[[headers]]
  for = "/admin"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://identity.netlify.com https://unpkg.com https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://unpkg.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: blob: https:; connect-src 'self' https://api.netlify.com https://identity.netlify.com https://*.netlify.com; worker-src 'self' blob:; frame-src 'self';"

[[headers]]
  for = "/admin/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://identity.netlify.com https://unpkg.com https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://unpkg.com; font-src 'self' https://fonts.gstatic.com data:; img-src 'self' data: blob: https:; connect-src 'self' https://api.netlify.com https://identity.netlify.com https://*.netlify.com; worker-src 'self' blob:; frame-src 'self';"

# ── Globale Header ────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"

# ── Redirects ─────────────────────────────────
[[redirects]]
  from   = "http://rosa-nolte.art/*"
  to     = "https://rosa-nolte.art/:splat"
  status = 301
  force  = true

[[redirects]]
  from   = "http://rosa-nolte.art/*"
  to     = "https://rosa-nolte.art/:splat"
  status = 301
  force  = true
